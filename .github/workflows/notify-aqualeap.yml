name: Notify AquaLeap

on:
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - "README*.md"
      - "docs/**"
      - ".github/aqualeap-project.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Verify trigger token
        shell: bash
        env:
          AQUALEAP_TRIGGER_TOKEN: ${{ secrets.AQUALEAP_TRIGGER_TOKEN }}
        run: |
          if [ -z "$AQUALEAP_TRIGGER_TOKEN" ]; then
            echo "::error::AQUALEAP_TRIGGER_TOKEN is not configured"
            exit 1
          fi

      - name: Trigger AquaLeap deployment
        shell: bash
        env:
          AQUALEAP_TRIGGER_TOKEN: ${{ secrets.AQUALEAP_TRIGGER_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          payload="$(jq -nc \
            --arg repository "$SOURCE_REPOSITORY" \
            --arg sha "$SOURCE_SHA" \
            '{
              ref: "main",
              inputs: {
                source_repository: $repository,
                source_sha: $sha,
                sync_reason: "project-readme-updated"
              }
            }')"

          curl --fail-with-body --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${AQUALEAP_TRIGGER_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Logikinet/Logikinet.github.io/actions/workflows/deploy.yml/dispatches" \
            --data "$payload"

          echo "AquaLeap deployment triggered by ${SOURCE_REPOSITORY}@${SOURCE_SHA}"
